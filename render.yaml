services:
  - type: web
    name: abierto
    runtime: node
    buildCommand: cd backend && npm install && cd ../frontend && npm install && npm run build
    startCommand: node backend/app.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: FRONTEND_URL
        value: https://abierto.app
      - key: DB_PATH
        value: /var/data/abierto.db
      - key: CORS_ORIGIN
        sync: false
      - key: JWT_SECRET
        sync: false
    plan: free
    domains:
      - abierto.app
      - www.abierto.app
